services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medintel
      POSTGRES_USER: medintel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medintel}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/hetzner/postgres_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro
  qdrant:
    image: qdrant/qdrant:v1.9.7
    volumes:
      - qdrant_data:/qdrant/storage
      - ./infra/hetzner/qdrant_config.yaml:/qdrant/config/production.yaml:ro
  backend:
    build: ./backend
    env_file: .env
    ports:
      - "4000:4000"
    depends_on:
      - postgres
      - qdrant
  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/hetzner/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
volumes:
  postgres_data:
  qdrant_data:
